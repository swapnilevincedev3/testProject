
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    

    header {
      background: #333;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
    }

    .cart {
      font-size: 1.2em;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .product {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .product h3 {
      margin: 10px 0;
    }

    .price {
      color: green;
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      background: #007bff;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <header>
    <h1>My Shop</h1>
    <div class="cart">🛒 Cart (0)</div>
  </header>

  <div class="container">

    <div class="product">
      <img src="https://via.placeholder.com/300" alt="Product 1">
      <h3>Product 1</h3>
      <p class="price">₹999</p>
      <button class="btn">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300" alt="Product 2">
      <h3>Product 2</h3>
      <p class="price">₹1499</p>
      <button class="btn">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300" alt="Product 3">
      <h3>Product 3</h3>
      <p class="price">₹1999</p>
      <button class="btn">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300" alt="Product 4">
      <h3>Product 4</h3>
      <p class="price">₹2499</p>
      <button class="btn">Add to Cart</button>
    </div>

  </div>

</body>
</html>
