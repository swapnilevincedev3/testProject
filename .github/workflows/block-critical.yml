name: Block PR on Critical CodeRabbit Issues

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-critical:
    runs-on: ubuntu-latest

    steps:
      - name: Check CodeRabbit comments for Critical issues
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });

            let hasCritical = false;

            for (const comment of comments.data) {
              if (
                comment.user.login.includes("coderabbit") &&
                comment.body.toLowerCase().includes("critical")
              ) {
                hasCritical = true;
                console.log("❌ Critical issue found:");
                console.log(comment.body);
              }
            }

            if (hasCritical) {
              core.setFailed("PR contains CRITICAL issues from CodeRabbit");
            } else {
              console.log("✅ No critical issues found");
            }
