name: CodeRabbit Enterprise Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  coderabbit-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Scan CodeRabbit Comments
        id: scan
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });

            let hasBlocker = false;
            let messages = [];

            for (const comment of comments) {
              const isCodeRabbit = comment.user.login.toLowerCase().includes("coderabbit");

              if (!isCodeRabbit) continue;

              const body = comment.body.toLowerCase();

              if (body.includes("critical") || body.includes("high")) {
                hasBlocker = true;
                messages.push(`- ${comment.body.substring(0, 300)}...`);
              }
            }

            core.setOutput("hasBlocker", hasBlocker);
            core.setOutput("messages", messages.join("\n"));

      # ✅ Create or Update Single Comment (No Spam)
      - name: Create/Update PR Comment
        if: steps.scan.outputs.hasBlocker == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "coderabbit-guard-comment";
            const prNumber = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.body && c.body.includes(marker)
            );

            const body = `
<!-- ${marker} -->
🚨 **CodeRabbit Critical/High Issues Detected**

Please resolve the following before merging:

${{ steps.scan.outputs.messages }}

❌ Merge is blocked until these are fixed.
`;

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body,
              });
            }

      # ✅ Auto Assign Author
      - name: Assign PR Author
        if: steps.scan.outputs.hasBlocker == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;

            await github.rest.issues.addAssignees({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              assignees: [author],
            });

      # ✅ Optional: Trigger Auto-Fix Label
      - name: Add Auto-Fix Label
        if: steps.scan.outputs.hasBlocker == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              labels: ["needs-fix", "coderabbit"],
            });

      # ❌ Block Merge
      - name: Fail PR if blockers found
        if: steps.scan.outputs.hasBlocker == 'true'
        run: exit 1

      # ✅ Pass if clean
      - name: Success
        if: steps.scan.outputs.hasBlocker != 'true'
        run: echo "No blocking issues"
