name: CodeRabbit Blocker

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  coderabbit-blocker:
    runs-on: ubuntu-latest

    steps:
      - name: Check CodeRabbit Comments
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });

            let hasBlockingIssue = false;

            for (const comment of comments) {
              const user = comment.user.login.toLowerCase();

              // Only check CodeRabbit comments
              if (!user.includes("coderabbit")) continue;

              const body = comment.body.toLowerCase();

              // Detect severity
              if (
                body.includes("critical") ||
                body.includes("high") ||
                body.includes("medium") ||
                body.includes("🔴") ||
                body.includes("🟠") ||
                body.includes("🟡")
              ) {
                hasBlockingIssue = true;
                console.log("❌ Blocking issue found:");
                console.log(body);
              }
            }

            if (hasBlockingIssue) {
              core.setFailed("PR blocked: CodeRabbit found Critical/High/Medium issues");
            } else {
              console.log("✅ No blocking issues found");
            }
