- name: Wait & Check CodeRabbit Status
  uses: actions/github-script@v7
  with:
    script: |
      const prNumber = context.payload.pull_request?.number || context.payload.issue.number;

      const sleep = (ms) => new Promise(r => setTimeout(r, ms));

      let attempts = 10;
      let hasReview = false;
      let hasBlockingIssue = false;

      while (attempts > 0) {
        console.log(`Checking CodeRabbit review... attempts left: ${attempts}`);

        const { data: comments } = await github.rest.issues.listComments({
          ...context.repo,
          issue_number: prNumber,
        });

        for (const comment of comments) {
          const user = comment.user.login.toLowerCase();

          if (!user.includes("coderabbit")) continue;

          const body = comment.body.toLowerCase();

          // Detect review completion
          if (
            body.includes("review") ||
            body.includes("analysis") ||
            body.includes("no actionable comments") ||
            body.includes("critical") ||
            body.includes("high") ||
            body.includes("medium")
          ) {
            hasReview = true;
          }

          // Detect blocking issues
          if (
            body.includes("critical") ||
            body.includes("high") ||
            body.includes("medium") ||
            body.includes("🔴") ||
            body.includes("🟠") ||
            body.includes("🟡")
          ) {
            hasBlockingIssue = true;
          }
        }

        if (hasReview) break;

        await sleep(15000); // wait 15 sec
        attempts--;
      }

      if (!hasReview) {
        core.setFailed("CodeRabbit review not completed yet");
      } else if (hasBlockingIssue) {
        core.setFailed("PR blocked: CodeRabbit found issues");
      } else {
        console.log("✅ CodeRabbit review complete and no blocking issues");
      }
