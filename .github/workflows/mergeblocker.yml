name: coderabbit-blocker

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]

# We need permissions to read PRs and write to commit statuses
permissions:
  pull-requests: read
  issues: read
  statuses: write

jobs:
  coderabbit-blocker:
    runs-on: ubuntu-latest

    steps:
      - name: Get PR Info and Head SHA
        id: context-check
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            let headSha = null;

            if (context.payload.pull_request) {
               // When triggered by PR directly
               prNumber = context.payload.pull_request.number;
               headSha = context.payload.pull_request.head.sha;
            } else if (context.payload.issue && context.payload.issue.pull_request) {
               // When triggered by a comment
               prNumber = context.payload.issue.number;
               // We must fetch the PR details to get the PR's latest commit (HEAD SHA)
               const { data: pr } = await github.rest.pulls.get({
                 ...context.repo,
                 pull_number: prNumber
               });
               headSha = pr.head.sha;
            }

            if (!prNumber || !headSha) {
              core.setOutput("skip", "true");
              return;
            }

             core.setOutput("skip", "false");
             core.setOutput("pr", prNumber);
             core.setOutput("sha", headSha);

      - name: Skip if not PR
        if: steps.context-check.outputs.skip == 'true'
        run: echo "Skipping - not a PR or missing info"

      - name: Analyze CodeRabbit Review and Update PR Status
        if: steps.context-check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.context-check.outputs.pr }}");
            const headSha = "${{ steps.context-check.outputs.sha }}";

            // Fetch comments
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });

            let hasBlockingIssue = false;
            let reviewCompleted = false;

             for (const comment of comments) {
               if (!comment.user) continue;
               const user = comment.user.login.toLowerCase();
               if (!user.includes("coderabbit")) continue;

               const body = comment.body.toLowerCase();

               // Detect review completion
               if (
                 body.includes("review completed") ||
                 body.includes("no actionable comments") ||
                 body.includes("analysis complete")
               ) {
                 reviewCompleted = true;
               }

               // Detect severity
               if (
                 body.includes("critical") ||
                 body.includes("high") ||
                 body.includes("medium") ||
                 body.includes("🔴") ||
                 body.includes("🟠") ||
                 body.includes("🟡")
               ) {
                 hasBlockingIssue = true;
               }
             }

             // default to pending
             let commitState = 'pending';
             let commitDescription = '⏳ Waiting for CodeRabbit review to complete...';

             if (reviewCompleted) {
               if (hasBlockingIssue) {
                 commitState = 'failure';
                 commitDescription = '❌ PR blocked: CodeRabbit issues found';
               } else {
                 commitState = 'success';
                 commitDescription = '✅ CodeRabbit review completed with no blocking issues';
               }
             }

             console.log(`Setting status check on PR to: ${commitState} (${commitDescription})`);

             // Use the GitHub API to forcefully change the PR requirement status check
             await github.rest.repos.createCommitStatus({
               ...context.repo,
               sha: headSha,
               state: commitState,
               context: 'CodeRabbit Review Status', // <-- This is the name of your new check!
               description: commitDescription,
               target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${prNumber}`
             });

             // If there's an issue, optionally mark this github action job as failed
             // We do NOT fail it on "pending" so we don't spam your actions tab with red 'fails' while waiting.
             if (commitState === 'failure') {
               core.setFailed(commitDescription);
             }
