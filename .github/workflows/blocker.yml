name: coderabbit-blocker

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  pull-requests: read
  issues: read
  statuses: write
  checks: read

jobs:
  coderabbit-blocker:
    runs-on: ubuntu-latest

    steps:
      - name: Get PR Info and Head SHA
        id: context-check
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            let headSha = null;

            if (context.payload.pull_request) {
               prNumber = context.payload.pull_request.number;
               headSha = context.payload.pull_request.head.sha;
            } else if (context.payload.issue && context.payload.issue.pull_request) {
               prNumber = context.payload.issue.number;
               const { data: pr } = await github.rest.pulls.get({
                 ...context.repo,
                 pull_number: prNumber
               });
               headSha = pr.head.sha;
            }

            if (!prNumber || !headSha) {
              core.setOutput("skip", "true");
              return;
            }

             core.setOutput("skip", "false");
             core.setOutput("pr", prNumber);
             core.setOutput("sha", headSha);

      - name: Skip if not PR
        if: steps.context-check.outputs.skip == 'true'
        run: echo "Skipping - not a PR or missing info"

      - name: Analyze CodeRabbit Review and Update PR Status
        if: steps.context-check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.context-check.outputs.pr }}");
            const headSha = "${{ steps.context-check.outputs.sha }}";
            let reviewCompleted = false;

            // SMART FIX: Pause for 15 seconds to eliminate the "API Race Condition"!
            // This gives GitHub's backend enough time to mark CodeRabbit's check as "Completed".
            console.log("Waiting 15 seconds for GitHub API to sync...");
            await new Promise(resolve => setTimeout(resolve, 15000));

            // 1. SMART CHECK: Look at the native CodeRabbit Check Run to see if it actually finished!
            try {
              const { data: checkRuns } = await github.rest.checks.listForRef({
                ...context.repo,
                ref: headSha,
              });
              const codeRabbitCheck = checkRuns.check_runs.find(c => c.name === 'CodeRabbit');
              if (codeRabbitCheck && codeRabbitCheck.status === 'completed') {
                reviewCompleted = true;
                console.log("✅ CodeRabbit native check run is completed.");
              }
            } catch (err) {
              console.log("Could not fetch check runs:", err.message);
            }

            // 2. Fetch ALL types of comments (Issue Comments, PR Reviews, Inline Comments)
            const allTextToCheck = [];

            // A. Standard Issue Comments
            const { data: issues } = await github.rest.issues.listComments({ ...context.repo, issue_number: prNumber });
            issues.forEach(c => { if(c.user?.login?.includes("coderabbit")) allTextToCheck.push(c.body || ""); });

            // B. Formal PR Reviews Summaries
            const { data: reviews } = await github.rest.pulls.listReviews({ ...context.repo, pull_number: prNumber });
            reviews.forEach(c => { 
               if(c.user?.login?.includes("coderabbit")) {
                 allTextToCheck.push(c.body || "");
                 // Any formal PR review posted by CodeRabbit confirms it has finished analyzing!
                 reviewCompleted = true; 
               }
            });

            // C. Inline Code Comments
            const { data: inlineComments } = await github.rest.pulls.listReviewComments({ ...context.repo, pull_number: prNumber });
            inlineComments.forEach(c => { if(c.user?.login?.includes("coderabbit")) allTextToCheck.push(c.body || ""); });

            const combinedText = allTextToCheck.join("\n").toLowerCase();

            // Fallback text check just in case
            if (!reviewCompleted) {
               if (
                 combinedText.includes("review completed") ||
                 combinedText.includes("no actionable comments") ||
                 combinedText.includes("analysis complete")
               ) {
                 reviewCompleted = true;
               }
            }

            // 3. Detect severity in ANY of the comments
            const hasBlockingIssue = 
               combinedText.includes("critical") ||
               combinedText.includes("major") ||
               combinedText.includes("high") ||
               combinedText.includes("medium") ||
               combinedText.includes("🔴") ||
               combinedText.includes("🟠") ||
               combinedText.includes("🟡");

            // 4. Decide final state
            let commitState = 'pending';
            let commitDescription = '⏳ Waiting for CodeRabbit review to complete...';

            if (reviewCompleted) {
              if (hasBlockingIssue) {
                commitState = 'failure';
                commitDescription = '❌ PR blocked: CodeRabbit issues found';
              } else {
                commitState = 'success';
                commitDescription = '✅ CodeRabbit review completed with no blocking issues';
              }
            }

            console.log(`Setting status check on PR to: ${commitState} (${commitDescription})`);

            // 5. Update the PR commit status
            await github.rest.repos.createCommitStatus({
              ...context.repo,
              sha: headSha,
              state: commitState,
              context: 'coderabbit-blocker',
              description: commitDescription,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${prNumber}`
            });

            // Mark this action itself as failed if it's blocking
            if (commitState === 'failure') {
              core.setFailed(commitDescription);
            }
