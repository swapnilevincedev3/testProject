
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #333;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.5em;
      color: #4facfe;
    }

    p {
      font-size: 1.1em;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      font-size: 1em;
      color: white;
      background: #4facfe;
      border: none;
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s ease;
    }


    
    .btn:hover {
      background: #00c6ff;
    }
  

</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Welcome 🎉</h1>
      <p>We're glad to have you here. Explore, learn, and enjoy your experience.</p>
      <a href="#" class="btn">Get Started</a>
    </div>
